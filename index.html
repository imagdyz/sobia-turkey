<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="منيو سوبيا تركي التفاعلي - أشهى أنواع السوبيا والعصائر الطبيعية.">
  <title>سوبيا تركي - المنيو التفاعلي</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="header-container">
      <div class="logo-section" onclick="window.location.hash = '#/'" id="logo-header">
        <img src="logo.png" alt="شعارات سوبيا تركي" class="logo-img">
        <div class="logo-text">
          <h1>سوبيا تركي</h1>
          <span>أشهى العصائر والسوبيا</span>
        </div>
      </div>

      <!-- Search Input -->
      <div class="search-wrapper">
        <input type="text" id="search-input" class="search-input" placeholder="ابحث عن مشروب أو صنف...">
        <span class="search-icon">🔍</span>
      </div>

      <!-- Cart Button -->
      <div class="cart-btn-wrapper">
        <button id="cart-toggle-btn" class="cart-toggle-btn">
          🛒 <span>السلة</span>
        </button>
        <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="main-content">
    <!-- Rendered dynamically by app.js -->
  </main>

  <!-- Footer Section -->
  <footer>
    <div class="footer-content">
      <div class="footer-logo">
        <img src="logo.png" alt="سوبيا تركي">
        <h2>سوبيا تركي</h2>
        <p>نعمل بحب لنقدم لكم ألذ المشروبات يومياً</p>
      </div>
      <div class="delivery-section" id="delivery-links">
        <!-- Injected by app.js -->
      </div>
      <div class="footer-bottom">
        <p>© 2026 سوبيا تركي. جميع الحقوق محفوظة.</p>
      </div>
    </div>
  </footer>

  <!-- Cart Modal -->
  <div id="cart-modal" class="cart-modal">
    <div class="modal-overlay" id="cart-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>سلة المشتريات</h2>
        <button class="close-btn" id="close-cart-btn">&times;</button>
      </div>
      
      <!-- Cart Items Screen -->
      <div id="cart-screen" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
        <div class="cart-items-container" id="cart-items-container">
          <!-- Cart items will be rendered dynamically -->
        </div>
        <div class="modal-footer">
          <div class="cart-total-box">
            <span>الإجمالي:</span>
            <span id="cart-total-price">0 جنيه</span>
          </div>
          <button class="btn btn-primary btn-block btn-lg" id="checkout-btn">إرسال الطلب عبر الواتساب</button>
        </div>
      </div>

      <!-- Checkout Form Screen (Initially Hidden) -->
      <div id="checkout-screen" style="display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 1.5rem; justify-content: space-between;">
        <div style="display: flex; flex-direction: column; gap: 1.2rem;">
          <h3 style="color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">بيانات التوصيل</h3>
          
          <div style="display: flex; flex-direction: column; gap: 0.35rem;">
            <label for="checkout-name" style="font-weight: 700; font-size: 0.95rem;">👤 الاسم:</label>
            <input type="text" id="checkout-name" class="search-input" placeholder="اسمك الكريم..." style="padding-right: 1rem;">
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 0.35rem;">
            <label for="checkout-phone" style="font-weight: 700; font-size: 0.95rem;">📞 رقم التلفون: <span style="color: red;">*</span></label>
            <input type="tel" id="checkout-phone" class="search-input" placeholder="رقم الموبايل للتواصل..." style="padding-right: 1rem;">
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 0.35rem;">
            <label for="checkout-address" style="font-weight: 700; font-size: 0.95rem;">📍 العنوان بالتفصيل: <span style="color: red;">*</span></label>
            <textarea id="checkout-address" class="search-input" style="height: 100px; resize: none; padding: 0.75rem 1rem;" placeholder="المنطقة، الشارع، رقم العمارة، الشقة..."></textarea>
          </div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
          <button class="btn btn-primary" id="confirm-checkout-btn" style="flex: 1; padding: 0.85rem; font-size: 1rem;">تأكيد وإرسال</button>
          <button class="btn btn-outline-primary" id="back-to-cart-btn" style="flex: 1; padding: 0.85rem; font-size: 1rem;">العودة</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">تم إضافة الصنف للسلة بنجاح!</div>

  <script src="app.js"></script>
</body>
</html>
